<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KI-Agent MVP</title>
  <style>
    /* Standard-Farben — werden pro Firma aus den Daten überschrieben.
       Premium-Look (Milestone 9): Töne per color-mix aus --farbe abgeleitet. */
    :root {
      --farbe: #2D5694; --akzent: #9db8dd;
      --linie: color-mix(in srgb, var(--farbe) 14%, #e8eaed);
      --farbe-dunkel: color-mix(in srgb, var(--farbe) 82%, #000);
      --tint: color-mix(in srgb, var(--farbe) 7%, #ffffff);
    }
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; -webkit-font-smoothing: antialiased;
           max-width: 620px; margin: 0 auto; padding: 1.5rem 1rem 2rem; color: #0f172a; min-height: 100vh;
           background:
             radial-gradient(120% 60% at 100% 0%, color-mix(in srgb, var(--farbe) 8%, transparent), transparent 55%),
             linear-gradient(180deg, color-mix(in srgb, var(--farbe) 4%, #fff), #f7f8fa); }
    h1 { font-size: 1.15rem; color: #475569; text-align: center; font-weight: 650; letter-spacing: 0.01em; }

    /* --- Charakter-Bühne (gleiche Erfahrung wie im eingebetteten Widget) --- */
    #kopfleiste { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.8rem; }
    #kopfleiste .name { font-weight: 650; font-size: 1rem; }
    #kopfleiste .status { font-size: 0.75rem; color: #64748b; display: flex; align-items: center; gap: 0.32rem; }
    #kopfleiste .status::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #4ade80; }
    #stimme { margin-left: auto; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--linie);
              background: #fff; color: var(--farbe); cursor: pointer; display: grid; place-items: center; padding: 0; }
    #stimme.an { background: var(--farbe); color: #fff; }
    #stimme svg { width: 18px; height: 18px; display: block; }

    #buehne { display: flex; flex-direction: column; align-items: center; gap: 0.7rem; text-align: center;
              padding: 1.5rem 1rem; border-radius: 18px; margin-bottom: 0.9rem;
              background: radial-gradient(125% 92% at 50% 0%, var(--tint), transparent 72%); }
    #avatar { width: 140px; height: 140px;
              filter: drop-shadow(0 12px 22px color-mix(in srgb, var(--farbe) 25%, transparent)); }
    #avatar svg, #avatar img { width: 100%; height: 100%; display: block; }
    #avatar svg { transform-origin: center bottom; animation: atmen 3.5s ease-in-out infinite; }
    #avatar-img { object-fit: contain; display: none; border-radius: 18px; }
    /* Basis-Firmen: leuchtender Orb in Markenfarbe (Plus = generiertes Bild). */
    #orb { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; display: none;
           background: radial-gradient(circle at 32% 28%, rgba(255,255,255,0.6), rgba(255,255,255,0) 46%),
                       radial-gradient(circle at 70% 78%, var(--akzent), var(--farbe) 74%); }
    #orb::before { content: ""; position: absolute; inset: -30%;
                   background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.35), transparent 42%);
                   animation: orbDreh 9s linear infinite; opacity: 0.5; }
    @keyframes orbDreh { to { transform: rotate(360deg); } }
    #avatar.sprechen { animation: redenBob 0.5s ease-in-out infinite; }
    @keyframes redenBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    #welle { display: none; gap: 3px; align-items: center; height: 15px; }
    #welle span { width: 3px; height: 15px; border-radius: 2px; background: var(--farbe);
                  animation: welle 0.5s ease-in-out infinite; }
    #welle span:nth-child(2){animation-delay:.1s} #welle span:nth-child(3){animation-delay:.2s}
    #welle span:nth-child(4){animation-delay:.15s} #welle span:nth-child(5){animation-delay:.05s}
    @keyframes welle { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }
    #blase { background: #fff; border: 1px solid var(--linie); border-radius: 16px; padding: 0.85rem 1.15rem;
             font-size: 1rem; line-height: 1.5; max-width: 440px; color: #0f172a;
             box-shadow: 0 8px 20px -14px rgba(15,23,42,0.55); }
    #blase.rein { animation: msgRein 0.34s cubic-bezier(0.22,1,0.36,1); }
    #blase .tippt span { background: color-mix(in srgb, var(--farbe) 55%, #94a3b8); }
    #chips { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
    #chips:empty { display: none; }
    #verlaufKopf { text-align: center; font-size: 0.72rem; color: #9aa3af; letter-spacing: 0.04em;
                   text-transform: uppercase; margin: 0 0 0.4rem; }

    /* ruhiges Atmen (Grundzustand "idle") */
    @keyframes atmen { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }

    /* Augen blinzeln gelegentlich */
    .augen { transform-box: fill-box; transform-origin: center; animation: blinzeln 4s infinite; }
    @keyframes blinzeln { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.1); } }

    /* Wangen (Erröten) — normal unsichtbar */
    .wange { opacity: 0; transition: opacity 0.3s; }
    /* Mund — Drehpunkt in der Mitte für die Sprech-Animation */
    .mund { transform-box: fill-box; transform-origin: center; }

    /* Zustand DENKEN: leicht wackeln, Augen wandern hoch */
    #avatar.denken svg { animation: wackeln 1.2s ease-in-out infinite; }
    @keyframes wackeln { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }
    #avatar.denken .augen { animation: none; transform: translateY(-4px); }

    /* Zustand SPRECHEN: Mund bewegt sich */
    #avatar.sprechen .mund { animation: reden 0.28s ease-in-out infinite; }
    @keyframes reden { 0%,100% { transform: scaleY(0.5); } 50% { transform: scaleY(1.3); } }

    /* Zustand VERLEGEN: Wangen rot, Augen schauen weg, kurz schrumpfen */
    #avatar.verlegen .wange { opacity: 0.75; }
    #avatar.verlegen .augen { animation: none; transform: translateX(4px); }
    #avatar.verlegen svg { animation: schrumpf 2s ease-in-out; }
    @keyframes schrumpf { 0% { transform: scale(1); } 30% { transform: scale(0.93); } 100% { transform: scale(1); } }

    /* Zustand FREUEN (Begrüssung): kleiner Hüpfer */
    #avatar.freuen svg { animation: huepf 0.6s ease; }
    @keyframes huepf { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-12px); } }

    /* --- Chat --- */
    #chat { border: 1px solid var(--linie); border-radius: 18px; padding: 1.1rem; height: 360px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 0.55rem; background: rgba(255,255,255,0.7);
            -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
            box-shadow: 0 10px 34px -18px rgba(15,23,42,0.35); }
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--farbe) 22%, transparent); border-radius: 999px; }
    .msg { padding: 0.62rem 0.85rem; border-radius: 16px; max-width: 82%; white-space: pre-wrap; line-height: 1.45;
           animation: msgRein 0.34s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes msgRein { from { opacity: 0; transform: translateY(7px) scale(0.98); } to { opacity: 1; transform: none; } }
    .user { align-self: flex-end; color: #fff; border-bottom-right-radius: 5px;
            background: linear-gradient(135deg, var(--farbe), var(--farbe-dunkel));
            box-shadow: 0 6px 16px -8px color-mix(in srgb, var(--farbe) 70%, transparent); }
    .bot  { align-self: flex-start; background: #fff; border: 1px solid var(--linie); border-bottom-left-radius: 5px;
            box-shadow: 0 4px 14px -10px rgba(15,23,42,0.4); }
    .meta { color: #94a3b8; font-style: italic; box-shadow: none; background: transparent; }
    form { display: flex; gap: 0.5rem; margin-top: 0.85rem; align-items: center; }
    input { flex: 1; padding: 0.7rem 0.95rem; border: 1px solid var(--linie); border-radius: 999px; font: inherit;
            background: #fff; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { outline: none; border-color: var(--farbe);
                  box-shadow: 0 0 0 3px color-mix(in srgb, var(--farbe) 18%, transparent); }
    button { padding: 0.7rem 1.2rem; border: 0; border-radius: 999px; color: #fff; cursor: pointer; font-weight: 600;
             background: linear-gradient(135deg, var(--farbe), var(--farbe-dunkel));
             box-shadow: 0 5px 14px -6px color-mix(in srgb, var(--farbe) 70%, transparent);
             transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s; }
    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: default; }
    /* "denkt nach"-Punkte in der Sprechblase */
    .tippt { display: inline-flex; gap: 4px; align-items: center; }
    .tippt span { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; animation: tip 1.3s infinite; }
    .tippt span:nth-child(2){animation-delay:.18s} .tippt span:nth-child(3){animation-delay:.36s}
    @keyframes tip { 0%,60%,100%{opacity:.28;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }
    @media (prefers-reduced-motion: reduce) {
      .msg, #avatar svg, #avatar.sprechen, #blase.rein, .augen, #welle span, .tippt span { animation: none !important; }
    }
  </style>
</head>
<body>
  <div id="kopfleiste">
    <span class="name" id="avatar-name">KI-Agent</span>
    <span class="status">online</span>
    <button id="stimme" aria-label="Vorlesen einschalten" aria-pressed="false" title="Antworten vorlesen">
      <svg id="stimme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    </button>
  </div>

  <!-- Charakter-Bühne: die Figur ist die Hauptperson; die Antwort erscheint als
       ihre Sprechblase, optional laut vorgelesen, mit Klappmaul beim Sprechen.
       #avatar = Platzhalter-SVG (Fallback), #avatar-img = generiertes Bild. -->
  <div id="buehne">
    <div id="avatar">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <ellipse class="koerper" cx="60" cy="62" rx="44" ry="42" fill="var(--farbe)" />
        <ellipse cx="60" cy="74" rx="26" ry="22" fill="var(--akzent)" opacity="0.5" />
        <circle class="wange" cx="38" cy="66" r="7" fill="#ff8a8a" />
        <circle class="wange" cx="82" cy="66" r="7" fill="#ff8a8a" />
        <g class="augen" fill="#1b2a22">
          <circle cx="47" cy="55" r="6" />
          <circle cx="73" cy="55" r="6" />
          <circle cx="49" cy="53" r="2" fill="#fff" />
          <circle cx="75" cy="53" r="2" fill="#fff" />
        </g>
        <ellipse class="mund" cx="60" cy="73" rx="9" ry="5" fill="#1b2a22" />
      </svg>
      <img id="avatar-img" alt="Charakter" />
      <div id="orb" aria-hidden="true"></div>
    </div>
    <div id="welle" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
    <div id="blase">Hallo! Schön, dass du da bist. Wie kann ich dir helfen?</div>
    <div id="chips"></div>
  </div>

  <div id="verlaufKopf">Gesprächsverlauf</div>
  <div id="chat"></div>
  <form id="form">
    <input id="input" placeholder="Frag mich etwas…" autocomplete="off" />
    <button id="mic" type="button" class="ki-mic" aria-label="Spracheingabe" title="Sprechen"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M5 10v1a7 7 0 0 0 14 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/></svg></button>
    <button id="send" type="submit">Senden</button>
  </form>
  <p style="text-align:center; margin-top:0.6rem;"><a id="erstellen-link" href="charakter.html">Eigenen Charakter erstellen →</a></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0"></script>
  <script src="lib/supabase-config.js"></script>
  <script src="lib/auth.js"></script>
  <script src="lib/store.js"></script>
  <script src="lib/chat-ui.js"></script>
  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const avatar = document.getElementById("avatar");
    const avatarImg = document.getElementById("avatar-img");
    const avatarName = document.getElementById("avatar-name");
    const blase = document.getElementById("blase");
    const chips = document.getElementById("chips");
    const welle = document.getElementById("welle");
    const stimmeBtn = document.getElementById("stimme");

    // Welche Firma dieser Agent vertritt.
    // Standard: salbei. Andere Firma testen: "?firma=nordlicht" an die URL hängen.
    const FIRMA_ID = new URLSearchParams(location.search).get("firma") || "salbei";

    // Generierte Charakter-Bilder pro Zustand (Phase 1). null = noch keine -> SVG-Fallback.
    // Erwartet später z.B. { idle: "<url>", denken: "<url>", sprechen: "<url>", verlegen: "<url>" }
    let bilder = null;

    // Gesetzt, wenn diese Firma ein Onboarding-Entwurf ist -> wird an den Chat mitgesendet.
    let firmaConfig = null;

    // --- Charakter-Steuerung ---
    // Bild wenn vorhanden, sonst Platzhalter-SVG. Die Zustands-Klasse wird immer
    // gesetzt, damit das Sprech-Wippen auch im Bild-Modus greift. Beim Sprechen
    // wird zwischen "Mund zu" und "Mund offen" gewechselt (Klappmaul), sofern das
    // sprechen_offen-Bild existiert.
    let flapTimer;
    function stopFlap() { clearInterval(flapTimer); flapTimer = null; }
    let revertTimer;
    function setCharakter(zustand, dauer) {
      clearTimeout(revertTimer);
      stopFlap();
      avatar.className = zustand === "idle" ? "" : zustand;
      const bildKey = zustand === "idle" ? "idle" : zustand;
      const svg = avatar.querySelector("svg");
      const orbEl = document.getElementById("orb");
      if (bilder && (bilder[bildKey] || bilder.idle)) {
        // Plus-Firma: generiertes Maskottchen. Lädt ein Bild nicht -> Orb statt leer.
        avatarImg.onerror = () => { avatarImg.style.display = "none"; orbEl.style.display = "block"; };
        avatarImg.src = bilder[bildKey] || bilder.idle;
        avatarImg.style.display = "block";
        svg.style.display = "none";
        orbEl.style.display = "none";
        if (zustand === "sprechen" && bilder.sprechen_offen && bilder.sprechen) {
          let auf = false;
          flapTimer = setInterval(() => {
            auf = !auf;
            avatarImg.src = auf ? bilder.sprechen_offen : bilder.sprechen;
          }, 180);
        }
      } else {
        // Basis-Firma: leuchtender Orb statt Platzhalter-SVG
        avatarImg.style.display = "none";
        svg.style.display = "none";
        orbEl.style.display = "block";
      }
      if (dauer) revertTimer = setTimeout(() => setCharakter("idle"), dauer);
    }

    // --- Sprechblase der Bühne + Denk-Anzeige ---
    function setzeBlase(text) {
      blase.textContent = text;
      blase.classList.remove("rein"); void blase.offsetWidth; blase.classList.add("rein");
    }
    function zeigeDenken() {
      blase.classList.remove("rein"); void blase.offsetWidth; blase.classList.add("rein");
      blase.textContent = "";
      const d = document.createElement("span");
      d.className = "tippt"; d.innerHTML = "<span></span><span></span><span></span>";
      blase.appendChild(d);
    }

    // --- Stimme: liest die Antwort laut vor (Browser-TTS), standardmässig AUS ---
    const TTS = ("speechSynthesis" in window);
    let stimmeAn = false;
    try { stimmeAn = localStorage.getItem("kiagent-stimme") === "1"; } catch (e) {}
    if (!TTS) stimmeBtn.style.display = "none";
    function malStimmeKnopf() {
      stimmeBtn.classList.toggle("an", stimmeAn);
      stimmeBtn.setAttribute("aria-pressed", String(stimmeAn));
      stimmeBtn.setAttribute("aria-label", stimmeAn ? "Vorlesen ausschalten" : "Vorlesen einschalten");
      document.getElementById("stimme-icon").innerHTML = stimmeAn
        ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/>'
        : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
    }
    malStimmeKnopf();
    stimmeBtn.addEventListener("click", () => {
      stimmeAn = !stimmeAn;
      try { localStorage.setItem("kiagent-stimme", stimmeAn ? "1" : "0"); } catch (e) {}
      malStimmeKnopf();
      if (!stimmeAn && TTS) { window.speechSynthesis.cancel(); welle.style.display = "none"; }
    });
    let sprechTimer;
    function beendeSprechen() { clearTimeout(sprechTimer); welle.style.display = "none"; setCharakter("idle"); }
    function liesVor(text) {
      if (!stimmeAn || !TTS || !text) return;
      try {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "de-DE";
        setCharakter("sprechen");
        welle.style.display = "flex";
        u.onend = beendeSprechen;
        u.onerror = beendeSprechen;
        clearTimeout(sprechTimer);
        sprechTimer = setTimeout(beendeSprechen, Math.min(30000, 2500 + text.length * 90));
        window.speechSynthesis.speak(u);
      } catch (e) { beendeSprechen(); }
    }

    // Gemeinsame Chat-Logik aus lib/chat-ui.js. Die Bühne (Sprechblase + Stimme)
    // wird über onFrage/onAntwort gesteuert; der Verlauf (#chat) füllt sich weiter.
    const ui = ChatUI.starten({
      chat, form, input, send,
      firmaId: FIRMA_ID,
      avatar: setCharakter,
      holeFirmaConfig: () => firmaConfig,
      chipsZiel: chips,
      onFrage: () => { zeigeDenken(); },
      onAntwort: (text) => { setzeBlase(text); liesVor(text); },
    });
    ChatUI.spracheAn(document.getElementById("mic"), input);

    // Beim Laden: Firma bestimmen (Onboarding-Entwurf hat Vorrang), Aussehen setzen, begrüssen.
    async function start() {
      let quelle = null;
      const entwurf = window.Store ? await Store.ladeFirma(FIRMA_ID) : null;

      if (entwurf) {
        // Onboarding-Entwurf (im Browser gespeichert): komplette Config an den Chat mitsenden.
        firmaConfig = entwurf;
        quelle = entwurf;
        const c = entwurf.charakter || {};
        if (c.farbe) { avatar.style.setProperty("--farbe", c.farbe); document.documentElement.style.setProperty("--farbe", c.farbe); }
        if (c.akzent) { avatar.style.setProperty("--akzent", c.akzent); document.documentElement.style.setProperty("--akzent", c.akzent); }
        if (c.bilder) bilder = c.bilder;
        avatarName.textContent = (entwurf.persona && entwurf.persona.name) || entwurf.name || "";
      } else {
        // Seed-Firma vom Backend (salbei/nordlicht).
        try {
          const res = await fetch("/.netlify/functions/firma?id=" + encodeURIComponent(FIRMA_ID));
          if (res.ok) {
            const f = await res.json();
            quelle = f;
            const c = f.charakter || {};
            if (c.farbe) { avatar.style.setProperty("--farbe", c.farbe); document.documentElement.style.setProperty("--farbe", c.farbe); }
            if (c.akzent) { avatar.style.setProperty("--akzent", c.akzent); document.documentElement.style.setProperty("--akzent", c.akzent); }
            if (c.bilder) bilder = c.bilder;
            if (f.persona) avatarName.textContent = f.persona;
          }
        } catch (e) { /* Aussehen ist nicht kritisch — Chat funktioniert trotzdem */ }
        // Override durch den eigenständigen Charakter-Ersteller (nur Seed-Firmen).
        try {
          const gespeichert = localStorage.getItem("charakter:" + FIRMA_ID);
          if (gespeichert) bilder = JSON.parse(gespeichert);
        } catch (e) {}
      }

      const link = document.getElementById("erstellen-link");
      if (link) link.href = "charakter.html?firma=" + encodeURIComponent(FIRMA_ID);

      setCharakter("freuen", 700);
      const gruss = "Hallo! Schön, dass du da bist. Wie kann ich dir helfen?";
      setzeBlase(gruss);                 // gross auf der Bühne
      ui.addBubble(gruss, "bot");        // und im nachlesbaren Verlauf
      ui.zeigeVorschlaege(ChatUI.vorschlaegeAus(quelle));
    }

    start();
  </script>
</body>
</html>
