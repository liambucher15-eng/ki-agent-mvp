<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <style>
    /* ══ Modern-Premium (Milestone 9) ═══════════════════════════════════════
       Alle Töne werden per color-mix AUS der Markenfarbe --farbe abgeleitet,
       damit das Widget in jeder Firmenfarbe stimmig aussieht. Kein externer
       Font, keine Lib — reines CSS (das Widget lädt in fremden Seiten). */
    :root {
      --farbe: #3f7d5a; --akzent: #a8d5b9;
      --tint:  color-mix(in srgb, var(--farbe) 7%, #ffffff);
      --tint2: color-mix(in srgb, var(--farbe) 4%, #ffffff);
      --linie: color-mix(in srgb, var(--farbe) 14%, #e8eaed);
      --farbe-dunkel: color-mix(in srgb, var(--farbe) 82%, #000);
      --schrift: 0.9rem;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
      display: flex; flex-direction: column; color: #0f172a;
      /* weicher Verlauf aus der Markenfarbe */
      background:
        radial-gradient(130% 90% at 100% 0%, var(--tint), transparent 55%),
        linear-gradient(180deg, var(--tint2), #f7f8fa);
    }

    /* --- Kopfzeile: Glas + Markenverlauf --- */
    #kopf { display: flex; align-items: center; gap: 0.7rem; padding: 0.82rem 1rem; flex-shrink: 0;
            color: #fff; position: relative; z-index: 3;
            background: linear-gradient(135deg, var(--farbe), var(--farbe-dunkel));
            box-shadow: 0 6px 22px -8px color-mix(in srgb, var(--farbe) 65%, transparent); }
    #kopf-avatar { width: 42px; height: 42px; flex-shrink: 0; border-radius: 50%;
                   background: rgba(255,255,255,0.16); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25);
                   overflow: hidden; display: grid; place-items: center; }
    #kopf-avatar svg, #kopf-avatar img { width: 100%; height: 100%; display: block; }
    #kopf-avatar svg { transform-origin: center bottom; animation: atmen 3.5s ease-in-out infinite; }
    #kopf-img { object-fit: cover; display: none; }
    #kopf-text { flex: 1; min-width: 0; }
    #kopf-name { font-weight: 650; font-size: 0.98rem; line-height: 1.2; letter-spacing: 0.01em; }
    #kopf-status { font-size: 0.72rem; opacity: 0.9; display: flex; align-items: center; gap: 0.32rem; }
    #kopf-status::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: #4ade80;
                           box-shadow: 0 0 0 0 rgba(74,222,128,0.7); animation: puls 2.4s ease-out infinite; }
    @keyframes puls { 0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); } 70%,100% { box-shadow: 0 0 0 6px rgba(74,222,128,0); } }
    #schliessen { background: rgba(255,255,255,0.14); border: 0; color: #fff; cursor: pointer; font-size: 1.15rem;
                  line-height: 1; width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center;
                  opacity: 0.9; transition: background 0.2s, opacity 0.2s, transform 0.2s; }
    #schliessen:hover { opacity: 1; background: rgba(255,255,255,0.28); transform: rotate(90deg); }

    /* Avatar-Zustände (vom Hauptchat übernommen) */
    @keyframes atmen { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    .augen { transform-box: fill-box; transform-origin: center; animation: blinzeln 4s infinite; }
    @keyframes blinzeln { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.1); } }
    .wange { opacity: 0; transition: opacity 0.3s; }
    .mund { transform-box: fill-box; transform-origin: center; }
    #kopf-avatar.denken svg { animation: wackeln 1.2s ease-in-out infinite; }
    @keyframes wackeln { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }
    #kopf-avatar.denken .augen { animation: none; transform: translateY(-3px); }
    #kopf-avatar.sprechen .mund { animation: reden 0.28s ease-in-out infinite; }
    @keyframes reden { 0%,100% { transform: scaleY(0.5); } 50% { transform: scaleY(1.3); } }
    #kopf-avatar.verlegen .wange { opacity: 0.75; }
    #kopf-avatar.verlegen .augen { animation: none; transform: translateX(3px); }
    #kopf-avatar.freuen svg { animation: huepf 0.6s ease; }
    @keyframes huepf { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

    /* --- Chatverlauf --- */
    #chat { flex: 1; overflow-y: auto; padding: 1rem 0.9rem; display: flex; flex-direction: column; gap: 0.55rem;
            scroll-behavior: smooth; }
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--farbe) 22%, transparent); border-radius: 999px; }
    .msg { padding: 0.62rem 0.85rem; border-radius: 16px; max-width: 84%; white-space: pre-wrap;
           font-size: var(--schrift); line-height: 1.45; animation: msgRein 0.34s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes msgRein { from { opacity: 0; transform: translateY(7px) scale(0.98); } to { opacity: 1; transform: none; } }
    .user { align-self: flex-end; color: #fff; border-bottom-right-radius: 5px;
            background: linear-gradient(135deg, var(--farbe), var(--farbe-dunkel));
            box-shadow: 0 6px 16px -8px color-mix(in srgb, var(--farbe) 70%, transparent); }
    .bot  { align-self: flex-start; background: rgba(255,255,255,0.9); border: 1px solid var(--linie);
            border-bottom-left-radius: 5px; box-shadow: 0 4px 14px -10px rgba(15,23,42,0.4);
            -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
    .meta { color: #94a3b8; font-style: italic; background: transparent; border: 0; box-shadow: none; padding: 0.3rem 0.4rem; }

    /* "tippt…" Punkte */
    .tippt { display: inline-flex; gap: 4px; align-items: center; padding: 0.15rem 0.1rem; }
    .tippt span { width: 7px; height: 7px; border-radius: 50%;
                  background: color-mix(in srgb, var(--farbe) 55%, #94a3b8); animation: tip 1.3s infinite; }
    .tippt span:nth-child(2) { animation-delay: 0.18s; }
    .tippt span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes tip { 0%,60%,100% { opacity: 0.28; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }

    /* --- Eingabe: Glasleiste --- */
    #form { display: flex; gap: 0.5rem; padding: 0.7rem 0.75rem; flex-shrink: 0; align-items: center;
            background: rgba(255,255,255,0.72); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
            border-top: 1px solid var(--linie); }
    #input { flex: 1; padding: 0.65rem 0.9rem; border: 1px solid var(--linie); border-radius: 999px; font: inherit;
             font-size: var(--schrift); background: #fff; transition: border-color 0.2s, box-shadow 0.2s; }
    #input:focus { outline: none; border-color: var(--farbe);
                   box-shadow: 0 0 0 3px color-mix(in srgb, var(--farbe) 18%, transparent); }
    #send { width: 40px; height: 40px; flex-shrink: 0; padding: 0; border: 0; border-radius: 50%; color: #fff;
            cursor: pointer; font-size: 1.1rem; display: grid; place-items: center;
            background: linear-gradient(135deg, var(--farbe), var(--farbe-dunkel));
            box-shadow: 0 5px 14px -5px color-mix(in srgb, var(--farbe) 70%, transparent);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s; }
    #send:hover:not(:disabled) { transform: translateY(-1px) scale(1.05);
            box-shadow: 0 8px 18px -6px color-mix(in srgb, var(--farbe) 75%, transparent); }
    #send:disabled { opacity: 0.45; cursor: default; }
    .fuss { text-align: center; font-size: 0.64rem; color: #9aa3af; padding: 0.35rem 0 0.5rem;
            background: rgba(255,255,255,0.72); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); }
    .fuss a { color: inherit; text-decoration: none; }

    @media (prefers-reduced-motion: reduce) {
      #kopf-avatar svg, .augen, .msg, #kopf-status::before, .tippt span { animation: none !important; }
      #chat { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <div id="kopf">
    <div id="kopf-avatar">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <ellipse class="koerper" cx="60" cy="62" rx="44" ry="42" fill="var(--akzent)" />
        <ellipse cx="60" cy="74" rx="26" ry="22" fill="#ffffff" opacity="0.35" />
        <circle class="wange" cx="38" cy="66" r="7" fill="#ff8a8a" />
        <circle class="wange" cx="82" cy="66" r="7" fill="#ff8a8a" />
        <g class="augen" fill="#1b2a22">
          <circle cx="47" cy="55" r="6" /><circle cx="73" cy="55" r="6" />
          <circle cx="49" cy="53" r="2" fill="#fff" /><circle cx="75" cy="53" r="2" fill="#fff" />
        </g>
        <ellipse class="mund" cx="60" cy="73" rx="9" ry="5" fill="#1b2a22" />
      </svg>
      <img id="kopf-img" alt="Charakter" />
    </div>
    <div id="kopf-text">
      <div id="kopf-name">Assistent</div>
      <div id="kopf-status">online</div>
    </div>
    <button id="schliessen" aria-label="Schliessen" title="Schliessen">×</button>
  </div>

  <div id="chat"></div>

  <form id="form">
    <input id="input" placeholder="Frag mich etwas…" autocomplete="off" />
    <button id="mic" type="button" class="ki-mic" aria-label="Spracheingabe" title="Sprechen"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M5 10v1a7 7 0 0 0 14 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/></svg></button>
    <button id="send" type="submit" aria-label="Senden">→</button>
  </form>
  <div class="fuss">mit KI-Agent</div>

  <!-- Bewusst OHNE Supabase-Skripte (Milestone 0): Das Widget läuft im BESUCHER-
       Kontext und liest Firmendaten ausschliesslich über die gefilterte
       /firma-Function — keine privaten Felder, kein Direktzugriff auf die DB. -->
  <script src="lib/chat-ui.js"></script>
  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const avatar = document.getElementById("kopf-avatar");
    const avatarImg = document.getElementById("kopf-img");
    const kopfName = document.getElementById("kopf-name");

    const _p = new URLSearchParams(location.search);
    const FIRMA_ID = _p.get("firma") || "salbei";
    // Seiten-Kontext vom Widget: welche Unterseite (pfad/titel) UND was steht
    // dort (inhalt, gekürzt) — damit der Agent zum Seiteninhalt antworten kann.
    const seiteInfo = {
      pfad: _p.get("pfad") || "",
      titel: _p.get("titel") || "",
      inhalt: _p.get("inhalt") || "",
    };
    let bilder = null;       // generierte Charakter-Bilder pro Zustand (sonst SVG-Fallback)

    // --- Schliessen: dem Eltern-Fenster (widget.js) Bescheid geben ---
    document.getElementById("schliessen").addEventListener("click", () => {
      parent.postMessage({ type: "ki-agent-schliessen" }, "*");
    });

    // --- Charakter-Steuerung (Bild wenn vorhanden, sonst Platzhalter-SVG) ---
    let revertTimer;
    function setCharakter(zustand, dauer) {
      clearTimeout(revertTimer);
      const svgKlasse = zustand === "idle" ? "" : zustand;
      const bildKey = zustand === "idle" ? "idle" : zustand;
      if (bilder && (bilder[bildKey] || bilder.idle)) {
        avatarImg.src = bilder[bildKey] || bilder.idle;
        avatarImg.style.display = "block";
        avatar.querySelector("svg").style.display = "none";
      } else {
        avatar.className = svgKlasse;
      }
      // Auch dem Eltern-Fenster (widget.js) melden: Die Launcher-FIGUR auf der
      // Kundenseite spiegelt den Zustand (denkt/spricht mit), wenn die Firma
      // eigene Zustands-Bilder hat.
      try { parent.postMessage({ type: "ki-agent-zustand", zustand: zustand }, "*"); } catch (e) {}
      if (dauer) revertTimer = setTimeout(() => setCharakter("idle"), dauer);
    }

    function addTipptAnzeige() {
      const div = document.createElement("div");
      div.className = "msg bot meta";
      div.innerHTML = '<span class="tippt"><span></span><span></span><span></span></span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function setFarben(c) {
      if (c.farbe) document.documentElement.style.setProperty("--farbe", c.farbe);
      if (c.akzent) document.documentElement.style.setProperty("--akzent", c.akzent);
      if (c.bilder) bilder = c.bilder;
    }

    // Firma laden — NUR über die gefilterte /firma-Function (Seed + Onboarding-
    // Firmen). Liefert auch faq/fakten für die Vorschlags-Chips, aber keine
    // privaten Felder. Der Prompt wird sowieso serverseitig gebaut (chat.js).
    async function start() {
      let quelle = null;
      try {
        const res = await fetch("/.netlify/functions/firma?id=" + encodeURIComponent(FIRMA_ID));
        if (res.ok) {
          const f = await res.json();
          quelle = f;
          setFarben(f.charakter || {});
          if (f.persona) kopfName.textContent = f.persona;
          else if (f.name) kopfName.textContent = f.name;
        }
      } catch (e) { /* Aussehen ist nicht kritisch */ }
      setCharakter("freuen", 700);
      ui.addBubble("Hallo! Wie kann ich dir helfen?", "bot");
      ui.zeigeVorschlaege(ChatUI.vorschlaegeAus(quelle));
    }

    // Gemeinsame Chat-Logik aus lib/chat-ui.js. Avatar + Tipp-Anzeige (Punkte)
    // bleiben lokal, weil das Widget eine eigene DOM-Struktur hat.
    const ui = ChatUI.starten({
      chat, form, input, send,
      firmaId: FIRMA_ID,
      avatar: setCharakter,
      tipptAn: addTipptAnzeige,
      seiteInfo: seiteInfo,
    });
    ChatUI.spracheAn(document.getElementById("mic"), input);

    start();
  </script>
</body>
</html>
