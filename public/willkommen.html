<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Willkommen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --indigo: #4F46E5; --indigo-hell: #6366F1; --violett: #8B5CF6;
      --coral: #FB7185; --orange: #F97316;
      --text: #111827; --grau: #6B7280; --sans: "Inter", system-ui, sans-serif;
      --display: "Plus Jakarta Sans", system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--sans); color: var(--text); background: #ffffff;
      display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 2rem;
    }

    /* Bühne hält Karte + Glow */
    .stage { position: relative; width: 100%; max-width: 1120px; }

    /* weicher mehrfarbiger Aura-Glow rundherum */
    .glow {
      position: absolute; inset: -50px; border-radius: 48px; z-index: 0;
      background: conic-gradient(from 120deg,
        var(--indigo-hell), var(--violett), var(--coral), var(--orange), var(--indigo-hell));
      filter: blur(70px); opacity: 0.5; will-change: transform;
    }

    /* die Split-Karte */
    .card {
      position: relative; z-index: 1; background: #fff; border-radius: 28px;
      box-shadow: 0 30px 80px -30px rgba(17,24,39,0.25);
      display: grid; grid-template-columns: 1fr 1fr; gap: 0; overflow: hidden;
      min-height: 540px;
    }

    /* LINKE Seite */
    .links { padding: 2.6rem 2.8rem; display: flex; flex-direction: column; }
    .logo { display: flex; align-items: center; gap: 0.55rem; font-family: var(--display);
            font-weight: 700; font-size: 1.05rem; }
    .logo .mark { width: 26px; height: 26px; border-radius: 7px;
      background: linear-gradient(135deg, var(--indigo), var(--coral) 60%, var(--orange));
      display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 0.85rem; }
    .links h1 { font-family: var(--display); font-size: 3rem; font-weight: 800; line-height: 1.05;
                letter-spacing: -0.03em; margin: auto 0 0; }
    .links .sub { color: var(--grau); font-size: 1.02rem; line-height: 1.55; margin-top: 1rem; max-width: 34ch; }
    .cta {
      align-self: flex-start; margin: 1.6rem 0 auto; font: inherit; font-weight: 600; font-size: 1rem;
      color: #fff; border: 0; border-radius: 14px; padding: 0.95rem 1.8rem; cursor: pointer;
      background: linear-gradient(135deg, var(--indigo), var(--indigo-hell));
      box-shadow: 0 12px 26px -8px rgba(79,70,229,0.6); transition: transform 0.14s, box-shadow 0.2s;
    }
    .cta:hover { transform: translateY(-2px); box-shadow: 0 16px 32px -8px rgba(79,70,229,0.7); }

    /* RECHTE Seite — animiertes Verlaufs-Panel */
    .rechts { position: relative; margin: 14px 14px 14px 0; border-radius: 20px; overflow: hidden;
              display: flex; flex-direction: column; justify-content: flex-end; padding: 1.6rem; }
    .rechts .feld { position: absolute; inset: 0; z-index: 0;
      background: linear-gradient(140deg, var(--indigo) 0%, var(--violett) 45%, var(--coral) 80%, var(--orange) 100%); }
    .rechts .welle { position: absolute; border-radius: 50%; filter: blur(36px); opacity: 0.6; will-change: transform; }
    .w1 { width: 320px; height: 320px; top: -60px; left: -40px; background: var(--indigo-hell); }
    .w2 { width: 300px; height: 300px; top: 30%; right: -60px; background: var(--coral); }
    .w3 { width: 280px; height: 280px; bottom: -60px; left: 30%; background: var(--orange); opacity: 0.5; }

    /* Glas-Chat-Vorschau */
    .chat-preview {
      position: relative; z-index: 1; align-self: flex-end; width: 100%; max-width: 340px;
      margin: 0 0 auto auto; background: rgba(255,255,255,0.22); backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.35);
      border-radius: 18px; padding: 1rem; display: flex; flex-direction: column; gap: 0.9rem;
    }
    .msg { display: flex; gap: 0.6rem; align-items: flex-start; }
    .msg .av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center;
               font-size: 0.8rem; color: #fff; }
    .msg.user .av { background: rgba(255,255,255,0.35); }
    .msg.bot .av { background: linear-gradient(135deg, var(--indigo), var(--coral)); }
    .msg .body { color: #fff; }
    .msg .rolle { font-weight: 700; font-size: 0.8rem; }
    .msg .txt { font-size: 0.82rem; line-height: 1.4; opacity: 0.95; }
    .tagline { position: relative; z-index: 1; color: rgba(255,255,255,0.92); font-size: 0.92rem; margin-top: 1.2rem; }

    /* Responsive: gestapelt auf Mobile */
    @media (max-width: 820px) {
      body { padding: 1rem; }
      .card { grid-template-columns: 1fr; min-height: 0; }
      .links { padding: 2rem 1.6rem; }
      .links h1 { font-size: 2.2rem; margin-top: 1.4rem; }
      .rechts { margin: 0 14px 14px; min-height: 340px; }
      .glow { inset: -30px; border-radius: 36px; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="glow" id="glow"></div>
    <div class="card">
      <!-- Links -->
      <div class="links">
        <div class="logo"><span class="mark">A</span><span>AuraChat</span></div>
        <h1>Willkommen<br>bei AuraChat</h1>
        <p class="sub">Erleben Sie KI-gestützte Gespräche, die sich wie Magie anfühlen. Ihr Assistent wartet.</p>
        <button class="cta">Jetzt starten</button>
      </div>

      <!-- Rechts -->
      <div class="rechts">
        <div class="feld"></div>
        <div class="welle w1"></div><div class="welle w2"></div><div class="welle w3"></div>

        <div class="chat-preview">
          <div class="msg user">
            <div class="av">🙂</div>
            <div class="body"><div class="rolle">User</div><div class="txt">Hey Aura, was kannst du tun?</div></div>
          </div>
          <div class="msg bot">
            <div class="av">A</div>
            <div class="body"><div class="rolle">Assistant</div><div class="txt">Ich kann schreiben, analysieren und kreativ sein. Testen Sie mich!</div></div>
          </div>
        </div>
        <div class="tagline">Intelligente Gespräche, mühelos.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script>
    // Aura-Glow langsam drehen -> lebendiges Leuchten rundherum
    gsap.to("#glow", { rotation: 360, duration: 32, ease: "none", repeat: -1, transformOrigin: "50% 50%" });
    // Verlaufs-Wellen sanft driften
    gsap.to(".w1", { x: 30, y: 40, scale: 1.15, duration: 9, ease: "sine.inOut", repeat: -1, yoyo: true });
    gsap.to(".w2", { x: -40, y: 30, scale: 1.2, duration: 11, ease: "sine.inOut", repeat: -1, yoyo: true });
    gsap.to(".w3", { x: 20, y: -30, scale: 1.1, duration: 8, ease: "sine.inOut", repeat: -1, yoyo: true });
    // sanfter Einzug der Chat-Vorschau
    gsap.from(".chat-preview", { y: 16, autoAlpha: 0, duration: 0.7, ease: "power2.out", delay: 0.2 });
  </script>
</body>
</html>
